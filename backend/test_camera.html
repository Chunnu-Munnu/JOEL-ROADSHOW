<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRINETRA - Camera Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A0E27 0%, #1A1D2E 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 102, 204, 0.1);
            border-radius: 10px;
            border: 2px solid #0066CC;
        }

        h1 {
            color: #0066CC;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 102, 204, 0.5);
        }

        .status {
            display: inline-block;
            padding: 8px 20px;
            background: #00FF00;
            color: #000;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .status.disconnected {
            background: #FF0000;
            color: #fff;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .video-section {
            background: rgba(26, 29, 46, 0.8);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #0066CC;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        #videoFeed {
            width: 100%;
            height: auto;
            display: block;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #0066CC;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid rgba(0, 102, 204, 0.3);
            border-top: 4px solid #0066CC;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: rgba(26, 29, 46, 0.8);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #0066CC;
        }

        .info-card h2 {
            color: #0066CC;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 102, 204, 0.3);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            color: #00FF00;
            font-weight: bold;
        }

        .detections-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .detection-item {
            background: rgba(0, 102, 204, 0.1);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 3px solid #0066CC;
        }

        .detection-item.threat {
            border-left-color: #FF0000;
            background: rgba(255, 0, 0, 0.1);
        }

        .threats-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .threat-item {
            background: rgba(255, 0, 0, 0.2);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #FF0000;
        }

        .threat-level {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .threat-level.CRITICAL {
            background: #FF0000;
            color: #fff;
        }

        .threat-level.HIGH {
            background: #FFA500;
            color: #000;
        }

        .threat-level.MEDIUM {
            background: #FFFF00;
            color: #000;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            background: #0066CC;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #0052A3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.5);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔱 TRINETRA SURVEILLANCE SYSTEM</h1>
            <div class="status disconnected" id="connectionStatus">DISCONNECTED</div>
        </header>

        <div class="main-content">
            <div class="video-section">
                <h2 style="margin-bottom: 15px; color: #0066CC;">📹 Live Camera Feed</h2>
                <div class="video-container">
                    <img id="videoFeed" alt="Video Feed">
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <div>Connecting to camera...</div>
                    </div>
                </div>
                <div class="controls">
                    <button id="connectBtn" onclick="connect()">Connect</button>
                    <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
                </div>
            </div>

            <div class="info-section">
                <div class="info-card">
                    <h2>📊 System Statistics</h2>
                    <div class="stat-item">
                        <span class="stat-label">Frame Count:</span>
                        <span class="stat-value" id="frameCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Detections:</span>
                        <span class="stat-value" id="detectionCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Threats:</span>
                        <span class="stat-value" id="threatCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">FPS:</span>
                        <span class="stat-value" id="fps">0</span>
                    </div>
                </div>

                <div class="info-card">
                    <h2>🎯 Current Detections</h2>
                    <div class="detections-list" id="detectionsList">
                        <p style="color: #888; text-align: center;">No detections yet...</p>
                    </div>
                </div>

                <div class="info-card">
                    <h2>⚠️ Active Threats</h2>
                    <div class="threats-list" id="threatsList">
                        <p style="color: #888; text-align: center;">No threats detected</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let frameCount = 0;
        let lastFrameTime = Date.now();
        let fpsCounter = 0;

        function connect() {
            const videoFeed = document.getElementById('videoFeed');
            const loading = document.getElementById('loading');
            const status = document.getElementById('connectionStatus');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');

            // Show loading
            loading.style.display = 'block';
            videoFeed.style.display = 'none';

            // Connect to WebSocket
            ws = new WebSocket('ws://localhost:8000/ws/video');

            ws.onopen = () => {
                console.log('Connected to TRINETRA');
                status.textContent = 'CONNECTED';
                status.classList.remove('disconnected');
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.error) {
                    console.error('Error:', data.error);
                    alert('Camera Error: ' + data.error);
                    disconnect();
                    return;
                }

                // Hide loading, show video
                loading.style.display = 'none';
                videoFeed.style.display = 'block';

                // Update video frame
                if (data.frame) {
                    videoFeed.src = 'data:image/jpeg;base64,' + data.frame;
                }

                // Update statistics
                frameCount = data.frame_number || frameCount + 1;
                document.getElementById('frameCount').textContent = frameCount;
                document.getElementById('detectionCount').textContent = data.detections?.length || 0;
                document.getElementById('threatCount').textContent = data.threats?.length || 0;

                // Calculate FPS
                const now = Date.now();
                fpsCounter++;
                if (now - lastFrameTime >= 1000) {
                    document.getElementById('fps').textContent = fpsCounter;
                    fpsCounter = 0;
                    lastFrameTime = now;
                }

                // Update detections list
                updateDetections(data.detections || []);

                // Update threats list
                updateThreats(data.threats || []);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                status.textContent = 'ERROR';
                status.classList.add('disconnected');
            };

            ws.onclose = () => {
                console.log('Disconnected from TRINETRA');
                status.textContent = 'DISCONNECTED';
                status.classList.add('disconnected');
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                loading.style.display = 'block';
                videoFeed.style.display = 'none';
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function updateDetections(detections) {
            const list = document.getElementById('detectionsList');
            
            if (detections.length === 0) {
                list.innerHTML = '<p style="color: #888; text-align: center;">No detections yet...</p>';
                return;
            }

            list.innerHTML = detections.map(det => `
                <div class="detection-item">
                    <strong>${det.class.toUpperCase()}</strong> #${det.track_id}<br>
                    <small>Confidence: ${(det.confidence * 100).toFixed(1)}%</small><br>
                    ${det.pose ? `<small>Pose: ${det.pose}</small><br>` : ''}
                    ${det.weapon ? `<small style="color: #FF0000;">⚠️ WEAPON: ${det.weapon.type}</small>` : ''}
                </div>
            `).join('');
        }

        function updateThreats(threats) {
            const list = document.getElementById('threatsList');
            
            if (threats.length === 0) {
                list.innerHTML = '<p style="color: #888; text-align: center;">No threats detected</p>';
                return;
            }

            list.innerHTML = threats.map(threat => `
                <div class="threat-item">
                    <span class="threat-level ${threat.level}">${threat.level}</span>
                    <strong> ${threat.type || 'Unknown Threat'}</strong><br>
                    <small>Score: ${(threat.score * 100).toFixed(1)}%</small><br>
                    <small>Behaviors: ${threat.behaviors?.join(', ') || 'None'}</small>
                </div>
            `).join('');
        }

        // Auto-connect on page load
        window.addEventListener('load', () => {
            setTimeout(connect, 500);
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', disconnect);
    </script>
</body>
</html>
